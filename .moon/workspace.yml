# https://moonrepo.dev/docs/config/workspace
$schema: "./cache/schemas/workspace.json"

defaultProject: app

projects:
  app: "."

vcs:
  defaultBranch: main
  client: "git"
  hooks:
    commit-msg:
      - "pnpm commitlint --edit $1"
    pre-commit:
      - "pnpm moon run :lint :format-check --affected --status=staged"
