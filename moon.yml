# yaml-language-server: $schema=.moon/cache/schemas/tasks.json
# https://moonrepo.dev/docs/config/tasks
$schema: .moon/cache/schemas/tasks.json

fileGroups:
  sources:
    - src/**/*
    - '*.ts'
    - '*.tsx'
    - '*.json'

tasks:
  # ── QOL ────────────────────────────────────────────────────

  lint:
    command: oxlint
    args:
      - --type-aware
      - --no-error-on-unmatched-pattern
      - --config
      - oxlint.config.ts
    inputs:
      - group: sources
      - /.gitignore
      - /oxlint.config.ts
    options:
      affectedFiles: args
      shell: false

  format:
    extends: _format
    args:
      - --write
    options:
      cache: false
      internal: false

  format-check:
    extends: _format
    args:
      - --check
    options:
      internal: false

  typecheck:
    command: tsc
    args:
      - --noEmit
    inputs:
      - group: sources
      - /tsconfig.json

  fix:
    command: noop
    deps:
      - lint-fix
      - format
    inputs: []
    options:
      cache: false
      runDepsInParallel: false

  # ── QOL (internal) ─────────────────────────────────────────

  _format:
    command: oxfmt
    args:
      - --no-error-on-unmatched-pattern
      - --config
      - oxfmt.config.ts
    inputs:
      - group: sources
      - /.gitignore
      - /oxfmt.config.ts
    options:
      affectedFiles: args
      shell: false
      internal: true

  lint-fix:
    extends: lint
    args:
      - --fix
    options:
      cache: false

  # ── Test ───────────────────────────────────────────────────

  test:
    command: vitest
    args:
      - --run
    inputs:
      - group: sources
      - /vite.config.ts
      - /tsconfig.json

  # ── Build ──────────────────────────────────────────────────

  build:
    command: pnpm
    args:
      - exec
      - vercel
      - build
    inputs:
      - group: sources
      - /vite.config.ts
      - /tsconfig.json
    outputs:
      - .vercel/output
    options:
      cache: false
