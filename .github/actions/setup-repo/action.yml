name: 'Setup Repo'
description: 'Sets up Node.js, pnpm, restores caches, and installs dependencies'

inputs:
  node-version:
    description: 'Version of Node.js to use'
    default: '24'

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline

    - name: Cache Moon Artifacts
      uses: actions/cache@v5
      with:
        path: |
          .moon/cache/hashes
          .moon/cache/outputs
          .moon/cache/states
        key: ${{ runner.os }}-moon-${{ hashFiles('moon.yml', '.moon/**/*.yml', 'package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-moon-${{ hashFiles('moon.yml', '.moon/**/*.yml', 'package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml') }}-
